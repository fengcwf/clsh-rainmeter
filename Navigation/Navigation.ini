[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc
@include=#@#Icons.inc

[NavBackground]
Meter=Shape
Shape=Rectangle (#NavX#),(#NavY#),(#NavW#),(#NavH#),0 | Fill Color 0,8,20,240 | StrokeWidth 0

[Home]
Meter=Image
ImageName=#IconHome#
X=(#NavX#+20)
Y=(#NavY#+15)
W=(32*#Scale#)
H=(32*#Scale#)
LeftMouseUpAction=["explorer.exe"]
