[Rainmeter]
Update=2000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,0

[Metadata]
Name=MD3 Status
Author=fengcwf
Information=Status module (battery, network, etc.)

[Variables]
ImgPath=#@#\Images\
FontName=Segoe UI Variable
FontSizeSmall=10
ColorText=255,255,255,255
IconBatteryCrop=48,0,48,48

[MeasureBattery]
Measure=Plugin
Plugin=Plugins\Battery.dll

[MeterBatteryIcon]
Meter=Image
ImageName=#ImgPath#icons.png
ImageCrop=#IconBatteryCrop#
W=24
H=24
X=8
Y=8

[MeterBattery]
Meter=String
MeasureName=MeasureBattery
FontFace=#FontName#
FontSize=#FontSizeSmall#
FontColor=#ColorText#
X=40
Y=10
