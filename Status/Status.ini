[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === CPU ===
[MeasureCPU]
Measure=CPU

[MeterCPULabel]
Meter=String
Text=CPU
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=(#StatusX#)
Y=(#StatusY#)

[MeterCPUBar]
Meter=Bar
MeasureName=MeasureCPU
X=(#StatusX#)
Y=(#StatusY#+40)
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Primary#

; === RAM ===
[MeasureRAM]
Measure=PhysicalMemory
Percentual=1

[MeterRAMLabel]
Meter=String
Text=RAM
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=(#StatusX#)
Y=(#StatusY#+120)

[MeterRAMBar]
Meter=Bar
MeasureName=MeasureRAM
X=(#StatusX#)
Y=(#StatusY#+160)
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Green#

; === Battery ===
[MeasureBattery]
Measure=Plugin
Plugin=Power
PowerState=PERCENT

[BatteryLabel]
Meter=String
Text=BATTERY
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=(#StatusX#)
Y=(#StatusY#+240)

[BatteryBar]
Meter=Bar
MeasureName=MeasureBattery
X=(#StatusX#)
Y=(#StatusY#+280)
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Green#

; === Network In ===
[MeasureNetIn]
Measure=NetIn

[NetInLabel]
Meter=String
Text=NET IN
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=(#StatusX#)
Y=(#StatusY#+360)

[NetInBar]
Meter=Bar
MeasureName=MeasureNetIn
X=(#StatusX#)
Y=(#StatusY#+400)
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Yellow#

; === Network Out ===
[MeasureNetOut]
Measure=NetOut

[NetOutLabel]
Meter=String
Text=NET OUT
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=(#StatusX#)
Y=(#StatusY#+480)

[NetOutBar]
Meter=Bar
MeasureName=MeasureNetOut
X=(#StatusX#)
Y=(#StatusY#+520)
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Purple#

; === Disk C ===
[MeasureDisk]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1

[DiskLabel]
Meter=String
Text=DISK C:
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=(#StatusX#)
Y=(#StatusY#+600)

[DiskBar]
Meter=Bar
MeasureName=MeasureDisk
X=(#StatusX#)
Y=(#StatusY#+640)
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Yellow#
