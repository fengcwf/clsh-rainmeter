[Rainmeter]
Update=3600
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === Weather Icon ===
[MeterWeatherIcon]
Meter=String
Text=☀
FontFace=#Font#
FontSize=(48*#Scale#)
FontColor=#Yellow#
X=50
Y=80

; === Temperature ===
[MeterTemp]
Meter=String
Text=26°C
FontFace=#Font#
FontSize=(32*#Scale#)
FontColor=#Yellow#
X=120
Y=90

; === Condition ===
[MeterCondition]
Meter=String
Text=SUNNY
FontFace=#Font#
FontSize=(16*#Scale#)
FontColor=#Yellow#
X=120
Y=130

; === Location ===
[MeterLocation]
Meter=String
Text=Tokyo
FontFace=#Font#
FontSize=(14*#Scale#)
FontColor=#Purple#
X=120
Y=160
