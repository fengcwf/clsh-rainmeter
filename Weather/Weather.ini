[Rainmeter]
Update=600
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === Weather API (wttr.in) ===
[MeasureWeather]
Measure=WebParser
URL=https://wttr.in/Tokyo?format=j1
UpdateRate=600
Download=1

; Parse temperature (note: wttr.in returns temp_C not temp_c)
[MeasureTemp]
Measure=WebParser
URL=[MeasureWeather]
RegExp="temp_C":"([^"]+)"
Substitute="":"--"
DynamicVariables=1

; Parse weather condition
[MeasureCondition]
Measure=WebParser
URL=[MeasureWeather]
RegExp="weatherDesc":\[{"value":"([^"]+)"}
Substitute="":"--"
DynamicVariables=1

; === Icon Mapping ===
[MeasureIcon]
Measure=Calc
Formula=1
IfCondition=(MeasureCondition = "Clear")
IfTrueAction=[!SetOption MeterWeatherIcon Text "☀"][!UpdateMeter MeterWeatherIcon][!Redraw]
IfCondition2=(MeasureCondition = "Clouds")
IfTrueAction2=[!SetOption MeterWeatherIcon Text "☁"][!UpdateMeter MeterWeatherIcon][!Redraw]
IfCondition3=(MeasureCondition = "Rain")
IfTrueAction3=[!SetOption MeterWeatherIcon Text "☂"][!UpdateMeter MeterWeatherIcon][!Redraw]
DynamicVariables=1

; === Display ===
[MeterWeatherIcon]
Meter=String
Text=☀
FontFace=#Font#
FontSize=(48*#Scale#)
FontColor=#Yellow#
X=(#WeatherX#)
Y=(#WeatherY#)

[MeterTemp]
Meter=String
MeasureName=MeasureTemp
X=(#WeatherX#+80)
Y=(#WeatherY#+10)
FontFace=#Font#
FontSize=(32*#Scale#)
FontColor=#Yellow#
Text=%1°C
AntiAlias=1

[MeterCondition]
Meter=String
MeasureName=MeasureCondition
X=(#WeatherX#+80)
Y=(#WeatherY#+50)
FontFace=#Font#
FontSize=(16*#Scale#)
FontColor=#Yellow#
Text=%1
AntiAlias=1

[MeterLocation]
Meter=String
Text=Tokyo
FontFace=#Font#
FontSize=(14*#Scale#)
FontColor=#Purple#
X=(#WeatherX#+80)
Y=(#WeatherY#+80)
