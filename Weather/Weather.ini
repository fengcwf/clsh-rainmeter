[Rainmeter]
Update=600000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,0

[Metadata]
Name=MD3 Weather
Author=fengcwf
Information=Weather module template (needs API key setup).

[Variables]
ImgPath=#@#\Images\
FontName=Segoe UI Variable
FontSize=12
IconWeatherCrop=96,0,48,48

[MeasureWeather]
Measure=Plugin
Plugin=Plugins\WeatherParser.dll
; Configure city / API as needed

[MeterIcon]
Meter=Image
ImageName=#ImgPath#icons.png
ImageCrop=#IconWeatherCrop#
W=48
H=48
X=8
Y=8

[MeterTemp]
Meter=String
MeasureName=MeasureWeather
MeasureType=STRING
Text=20°C
FontFace=#FontName#
FontSize=#FontSize#
X=64
Y=16
