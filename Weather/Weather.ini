[Rainmeter]
Update=600
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === Weather API (wttr.in) ===
[MeasureWeather]
Measure=WebParser
URL=https://wttr.in/Tokyo?format=j1
UpdateRate=600
Download=1

; Parse temperature
[MeasureTemp]
Measure=WebParser
URL=[MeasureWeather]
RegExp=(?s)"temp_c":(\d+)
Substitute="":"--"
DynamicVariables=1

; Parse weather condition
[MeasureCondition]
Measure=WebParser
URL=[MeasureWeather]
RegExp=(?s)"weatherDesc":\[{"value":"([^"]+)"}]
Substitute="":"--"
DynamicVariables=1

; === Display ===
[MeterWeatherIcon]
Meter=String
Text=☀
FontFace=#Font#
FontSize=(48*#Scale#)
FontColor=#Yellow#
X=(#WeatherX#)
Y=(#WeatherY#)

[MeterTemp]
Meter=String
MeasureName=MeasureTemp
X=(#WeatherX#+80)
Y=(#WeatherY#+10)
FontFace=#Font#
FontSize=(32*#Scale#)
FontColor=#Yellow#
Text=%1°C
AntiAlias=1

[MeterCondition]
Meter=String
MeasureName=MeasureCondition
X=(#WeatherX#+80)
Y=(#WeatherY#+50)
FontFace=#Font#
FontSize=(16*#Scale#)
FontColor=#Yellow#
Text=%1
AntiAlias=1

[MeterLocation]
Meter=String
Text=Tokyo
FontFace=#Font#
FontSize=(14*#Scale#)
FontColor=#Purple#
X=(#WeatherX#+80)
Y=(#WeatherY#+80)
