[Rainmeter]
Update=200
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === Lua Script ===
[MeasureDino]
Measure=Script
ScriptFile=#@#Lua\Dino.lua

; === Dino Display ===
[MeterDino]
Meter=Image
MeasureName=MeasureDino
ImageName=#@#Images\Dino\idle#MeasureDino#.png
X=(#SCREENAREAWIDTH#/2-64)
Y=700
W=128
H=128
AntiAlias=0
DynamicVariables=1

; === Apple ===
[Apple]
Meter=Image
ImageName=#@#Images\apple.png
X=(#SCREENAREAWIDTH#/2+100)
Y=750
W=48
H=48
LeftMouseUpAction=[!CommandMeasure MeasureDino "Eat"]
DynamicVariables=1

; === EXP Bar ===
[MeterEXPLabel]
Meter=String
Text=LEVEL
FontFace=#Font#
FontSize=(16*#Scale#)
FontColor=#Primary#
X=(#SCREENAREAWIDTH#/2-200)
Y=850

[MeterLevel]
Meter=String
MeasureName=MeasureDino
Text=Level %1
FontFace=#Font#
FontSize=(20*#Scale#)
FontColor=#Yellow#
X=(#SCREENAREAWIDTH#/2-100)
Y=845
DynamicVariables=1

[MeterEXPBarBg]
Meter=Shape
Shape=Rectangle (#SCREENAREAWIDTH#/2),850,(300*#Scale#),(12*#Scale#),3 | Fill Color 30,40,60,255 | StrokeWidth 0

[MeterEXPBarFill]
Meter=Shape
Shape=Rectangle (#SCREENAREAWIDTH#/2),850,(200*#Scale#),(12*#Scale#),3 | Fill Color #Yellow# | StrokeWidth 0
DynamicVariables=1
