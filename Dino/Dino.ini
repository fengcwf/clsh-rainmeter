[Rainmeter]
Update=200
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === Lua Script ===
[MeasureDino]
Measure=Script
ScriptFile=#@#Lua\Dino.lua

; === Dino Display ===
[MeterDino]
Meter=Image
MeasureName=MeasureDino
ImageName=#@#Images\Dino\#MeasureDino#.png
X=(#DinoX#)
Y=(#DinoY#)
W=128
H=128
AntiAlias=0
DynamicVariables=1

; === Apple ===
[Apple]
Meter=Image
ImageName=#@#Images\apple.png
X=(#DinoX#+180)
Y=(#DinoY#+50)
W=48
H=48
LeftMouseUpAction=[!CommandMeasure MeasureDino "Eat"]
DynamicVariables=1

; === EXP ===
[MeterEXPLabel]
Meter=String
Text=LEVEL
FontFace=#Font#
FontSize=(16*#Scale#)
FontColor=#Primary#
X=(#DinoX#-100)
Y=(#DinoY#+150)

[MeterLevel]
Meter=String
MeasureName=MeasureDino
Text=Level %1
FontFace=#Font#
FontSize=(20*#Scale#)
FontColor=#Yellow#
X=(#DinoX#)
Y=(#DinoY#+145)
DynamicVariables=1

[MeterEXPBarBg]
Meter=Shape
Shape=Rectangle (#DinoX#+120),(#DinoY#+150),(300*#Scale#),(12*#Scale#),3 | Fill Color 30,40,60,255 | StrokeWidth 0

[MeterEXPBarFill]
Meter=Shape
Shape=Rectangle (#DinoX#+120),(#DinoY#+150),(200*#Scale#),(12*#Scale#),3 | Fill Color #Yellow# | StrokeWidth 0
DynamicVariables=1
