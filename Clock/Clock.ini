[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,0

[Metadata]
Name=MD3 Clock
Author=fengcwf
Information=Clock module using font and optional icon.

[Variables]
ImgPath=#@#\Images\
FontName=Segoe UI Variable
FontSize=20
TimeColor=255,255,255,255
IconClockCrop=0,0,48,48
IconScale=1.0

[MeasureTime]
Measure=Time
Format=%H:%M

[MeterIcon]
Meter=Image
ImageName=#ImgPath#icons.png
ImageCrop=#IconClockCrop#
W=48
H=48
X=8
Y=8
PreserveAspectRatio=1

[MeterTime]
Meter=String
MeasureName=MeasureTime
FontFace=#FontName#
FontSize=#FontSize#
FontColor=#TimeColor#
AntiAlias=1
X=64
Y=16
