[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

[MeasureTime]
Measure=Time
Format=%H:%M:%S

[MeterTime]
Meter=String
MeasureName=MeasureTime
FontFace=#Font#
FontSize=(96*#Scale#)
FontColor=#Primary#
X=(#ClockX#)
Y=(#ClockY#)
StringAlign=Center
AntiAlias=1

[MeasureDate]
Measure=Time
Format=%A %m.%d.%Y

[MeterDate]
Meter=String
MeasureName=MeasureDate
FontFace=#Font#
FontSize=(24*#Scale#)
FontColor=#Purple#
X=(#ClockX#)
Y=(#ClockY#+160)
StringAlign=Center
AntiAlias=1
