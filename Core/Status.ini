[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === CPU ===
[MeasureCPU]
Measure=CPU

[MeterCPULabel]
Meter=String
Text=CPU
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=80
Y=80

[MeterCPUBar]
Meter=Bar
MeasureName=MeasureCPU
X=80
Y=120
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Primary#

; === RAM ===
[MeasureRAM]
Measure=PhysicalMemory
Percentual=1

[MeterRAMLabel]
Meter=String
Text=RAM
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=80
Y=200

[MeterRAMBar]
Meter=Bar
MeasureName=MeasureRAM
X=80
Y=240
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Green#

; === Battery ===
[MeasureBattery]
Measure=Plugin
Plugin=Power
PowerState=PERCENT

[BatteryLabel]
Meter=String
Text=BATTERY
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=80
Y=320

[BatteryBar]
Meter=Bar
MeasureName=MeasureBattery
X=80
Y=360
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Green#

; === Network In ===
[MeasureNetIn]
Measure=NetIn

[NetInLabel]
Meter=String
Text=NET IN
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=80
Y=440

[NetInBar]
Meter=Bar
MeasureName=MeasureNetIn
X=80
Y=480
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Yellow#

; === Network Out ===
[MeasureNetOut]
Measure=NetOut

[NetOutLabel]
Meter=String
Text=NET OUT
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=80
Y=560

[NetOutBar]
Meter=Bar
MeasureName=MeasureNetOut
X=80
Y=600
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Purple#

; === Disk C ===
[MeasureDisk]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1

[DiskLabel]
Meter=String
Text=DISK C:
FontFace=#Font#
FontSize=(18*#Scale#)
FontColor=#Primary#
X=80
Y=680

[DiskBar]
Meter=Bar
MeasureName=MeasureDisk
X=80
Y=720
W=(400*#Scale#)
H=(12*#Scale#)
BarColor=#Yellow#
