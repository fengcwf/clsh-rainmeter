[Rainmeter]
Update=1000
AccurateText=1

@include=#@#Variables.inc

[NavBackground]
Meter=Shape
Shape=Rectangle 0,0,(#SCREENAREAWIDTH#),(#TopBarH#),0 | Fill Color 0,8,20,240 | StrokeWidth 0

[Home]
Meter=Image
ImageName=#@#Images\Icons\home.png
X=50
Y=15
W=(32*#Scale#)
H=(32*#Scale#)
LeftMouseUpAction=["explorer.exe"]
