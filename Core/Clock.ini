[Rainmeter]
Update=1000
AccurateText=1

@include=#@#Variables.inc

[MeasureTime]
Measure=Time
Format=%H:%M:%S

[MeterTime]
Meter=String
MeasureName=MeasureTime
FontFace=#Font#
FontSize=(96*#Scale#)
FontColor=#Primary#
X=(#SCREENAREAWIDTH#/2)
Y=140
StringAlign=Center
AntiAlias=1

[MeasureDate]
Measure=Time
Format=%A %m.%d.%Y

[MeterDate]
Meter=String
MeasureName=MeasureDate
FontFace=#Font#
FontSize=(24*#Scale#)
FontColor=#Purple#
X=(#SCREENAREAWIDTH#/2)
Y=300
StringAlign=Center
AntiAlias=1
