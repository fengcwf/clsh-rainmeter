[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

OnRefreshAction=[
!ActivateConfig "clsh\Navigation" "Navigation.ini"][!ActivateConfig "clsh\Clock" "Clock.ini"][!ActivateConfig "clsh\Status" "Status.ini"][!ActivateConfig "clsh\Music" "Music.ini"][!ActivateConfig "clsh\Dino" "Dino.ini"][!ActivateConfig "clsh\Weather" "Weather.ini"]

OnCloseAction=[
!DeactivateConfig "clsh\Navigation"][!DeactivateConfig "clsh\Clock"][!DeactivateConfig "clsh\Status"][!DeactivateConfig "clsh\Music"][!DeactivateConfig "clsh\Dino"][!DeactivateConfig "clsh\Weather"]
