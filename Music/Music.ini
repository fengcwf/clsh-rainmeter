[Rainmeter]
Update=100
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc
@include=#@#Icons.inc

; === WebNowPlaying ===
[MeasureCover]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Cover

[MeasureTitle]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist

[MeasureState]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=State
UpdateDivider=10
IfCondition=(MeasureState=1)
IfTrueAction=[!CommandMeasure MeasureDino "MusicBounce()"]
IfFalseAction=[!CommandMeasure MeasureDino "MusicStop()"]

; === Album Cover ===
[MeterCover]
Meter=Image
MeasureName=MeasureCover
X=(#MusicX#)
Y=(#MusicY#)
W=180
H=180
PreserveAspectRatio=1
DynamicVariables=1

; === Track Title ===
[MeterTitle]
Meter=String
MeasureName=MeasureTitle
X=(#MusicX#+210)
Y=(#MusicY#+10)
FontFace=#Font#
FontSize=(24*#Scale#)
FontColor=#Primary#
ClipString=1
ClipStringW=300
AntiAlias=1
DynamicVariables=1

; === Artist ===
[MeterArtist]
Meter=String
MeasureName=MeasureArtist
X=(#MusicX#+210)
Y=(#MusicY#+50)
FontFace=#Font#
FontSize=(16*#Scale#)
FontColor=#Purple#
ClipString=1
ClipStringW=300
AntiAlias=1
DynamicVariables=1

; === Controls ===
[Play]
Meter=Image
ImageName=#IconPlay#
X=(#MusicX#+210)
Y=(#MusicY#+120)
W=(32*#Scale#)
H=(32*#Scale#)
LeftMouseUpAction=[!CommandMeasure MeasureState "PlayPause"]
DynamicVariables=1

[Prev]
Meter=Image
ImageName=#IconPrev#
X=(#MusicX#+150)
Y=(#MusicY#+120)
W=(28*#Scale#)
H=(28*#Scale#)
LeftMouseUpAction=[!CommandMeasure MeasureState "Previous"]
DynamicVariables=1

[Next]
Meter=Image
ImageName=#IconNext#
X=(#MusicX#+270)
Y=(#MusicY#+120)
W=(28*#Scale#)
H=(28*#Scale#)
LeftMouseUpAction=[!CommandMeasure MeasureState "Next"]
DynamicVariables=1
