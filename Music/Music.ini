[Rainmeter]
Update=3000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,0

[Metadata]
Name=MD3 Music
Author=fengcwf
Information=Music playback module template.

[Variables]
ImgPath=#@#\Images\
FontName=Segoe UI Variable
FontSize=12
IconPlayCrop=144,0,48,48
IconPauseCrop=192,0,48,48

[MeasurePlayer]
Measure=NowPlaying
PlayerName=Spotify

[MeterAlbum]
Meter=Image
ImageName=#@#\Images\ui.png
ImageCrop=0,0,80,80
W=80
H=80
X=8
Y=8

[MeterTitle]
Meter=String
MeasureName=MeasurePlayer
MeasureType=STRING
Text=#NowPlayingTitle#
FontFace=#FontName#
FontSize=#FontSize#
X=100
Y=10

[MeterPlay]
Meter=Image
ImageName=#ImgPath#icons.png
ImageCrop=#IconPlayCrop#
W=24
H=24
X=100
Y=40
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Play/Pause"]
