[Rainmeter]
Update=100
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === WebNowPlaying Measures ===
[MeasureCover]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Cover

[MeasureTitle]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title

[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist

[MeasureState]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=State
UpdateDivider=10

; === Album Cover ===
[MeterCover]
Meter=Image
MeasureName=MeasureCover
X=50
Y=80
W=180
H=180
PreserveAspectRatio=1
DynamicVariables=1

; === Track Title ===
[MeterTitle]
Meter=String
MeasureName=MeasureTitle
X=260
Y=90
FontFace=#Font#
FontSize=(24*#Scale#)
FontColor=#Primary#
ClipString=1
ClipStringW=300
AntiAlias=1
DynamicVariables=1

; === Artist ===
[MeterArtist]
Meter=String
MeasureName=MeasureArtist
X=260
Y=130
FontFace=#Font#
FontSize=(16*#Scale#)
FontColor=#Purple#
ClipString=1
ClipStringW=300
AntiAlias=1
DynamicVariables=1

; === Progress Bar ===
[MeterProgressBg]
Meter=Shape
Shape=Rectangle 260,175,(300*#Scale#),(6*#Scale#),3 | Fill Color 30,40,60,255 | StrokeWidth 0

[MeterProgressFill]
Meter=Shape
Shape=Rectangle 260,175,(200*#Scale#),(6*#Scale#),3 | Fill Color #Primary# | StrokeWidth 0
DynamicVariables=1

; === Controls ===
[Play]
Meter=Image
ImageName=#@#Images\Icons\play.png
X=260
Y=200
W=(32*#Scale#)
H=(32*#Scale#)
LeftMouseUpAction=[!CommandMeasure MeasureState "PlayPause"]
DynamicVariables=1

[Prev]
Meter=Image
ImageName=#@#Images\Icons\prev.png
X=200
Y=200
W=(28*#Scale#)
H=(28*#Scale#)
LeftMouseUpAction=[!CommandMeasure MeasureState "Previous"]
DynamicVariables=1

[Next]
Meter=Image
ImageName=#@#Images\Icons\next.png
X=320
Y=200
W=(28*#Scale#)
H=(28*#Scale#)
LeftMouseUpAction=[!CommandMeasure MeasureState "Next"]
DynamicVariables=1
