[Rainmeter]
Update=50
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === AudioLevel Plugin ===
[MeasureAudio]
Measure=Plugin
Plugin=AudioLevel
Port=Output
RMSAverage=1

; === 32 Band Visualizer ===
[Band1]
Meter=Bar
MeasureName=MeasureAudio
X=0
Y=0
W=(8*#Scale#)
H=(60*#Scale#)
BarColor=#Primary#
BarOrientation=Vertical
MinValue=0
MaxValue=100
DynamicVariables=1

