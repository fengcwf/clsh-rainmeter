[Rainmeter]
Update=50
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

@include=#@#Variables.inc

; === AudioLevel Plugin ===
[MeasureAudio]
Measure=Plugin
Plugin=AudioLevel
Port=Output
RMSAverage=1

; === 8 Per-Band Measures ===
[MeasureBand1]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=1
BandIndex=1

[MeasureBand2]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=2
BandIndex=2

[MeasureBand3]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=3
BandIndex=3

[MeasureBand4]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=4
BandIndex=4

[MeasureBand5]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=5
BandIndex=5

[MeasureBand6]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=6
BandIndex=6

[MeasureBand7]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=7
BandIndex=7

[MeasureBand8]
Measure=Plugin
Plugin=AudioLevel
Port=0
FFTSize=1024
FFTOverlap=512
Bands=8
BandIndex=8

; === 8 Band Meters ===
[Band1]
Meter=Bar
MeasureName=MeasureBand1
X=0
Y=0
W=(8*#Scale#)
H=(60*#Scale#)
BarColor=#Primary#
BarOrientation=Vertical
DynamicVariables=1

[Band2]
Meter=Bar
MeasureName=MeasureBand2
X=(10*#Scale#)
Y=0
W=(8*#Scale#)
H=(60*#Scale#)
